<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations – Travel Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar"><div class="nav-content">
        <a href="index.html" class="nav-logo"><i class="fas fa-globe-americas"></i><span>Travel Companion</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="destinations.html" class="active">Destinations</a></li>
            <li><a href="trip-planner.html">Trip Planner</a></li>
            <li><a href="companions.html">Find Companions</a></li>
            <li class="auth-link"><a href="dashboard.html">Dashboard</a></li>
            <li class="auth-link"><a href="#" onclick="logout()">Logout</a></li>
            <li class="guest-link"><a href="login.html">Login</a></li>
            <li class="guest-link"><a href="register.html">Sign Up</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle"><i class="fas fa-moon"></i></button>
            <button class="nav-toggle"><i class="fas fa-bars"></i></button>
        </div>
    </div></nav>

    <header class="page-header">
        <h1>Explore Destinations</h1>
        <p>Find your next dream destination from around the world</p>
    </header>

    <section class="section">
        <div class="container">
            <!-- Search & Filters -->
            <div style="max-width: 600px; margin: 0 auto 32px;">
                <div style="position: relative;">
                    <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--gray);"></i>
                    <input type="text" id="destinationSearch" class="form-control" placeholder="Search destinations by name or country..." style="padding-left: 44px;">
                </div>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="spring">Spring</button>
                <button class="filter-btn" data-filter="summer">Summer</button>
                <button class="filter-btn" data-filter="fall">Fall</button>
                <button class="filter-btn" data-filter="winter">Winter</button>
                <button class="filter-btn" data-filter="dry">Dry Season</button>
            </div>

            <!-- Grid -->
            <div id="destinationsGrid" class="destinations-grid">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2026 Travel Companion. All rights reserved.</p></div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/destinations.js"></script>
    <script>
        // Handle search param from hero
        const urlParams = new URLSearchParams(window.location.search);
        const searchParam = urlParams.get('search');
        if (searchParam) {
            document.addEventListener('DOMContentLoaded', () => {
                const input = document.getElementById('destinationSearch');
                if (input) { input.value = searchParam; filterDestinations(); }
            });
        }
    </script>
</body>
</html>
