# ===== Server =====
server.port=${PORT:8080}

# ===== PostgreSQL Database (Production) =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/travelcompanion}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===== HikariCP Connection Pool (Resilience) =====
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ===== JWT =====
jwt.secret=${JWT_SECRET:TravelCompanionSecretKey2024VeryLongSecretKeyForJWTTokenGeneration256Bit}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== OpenWeather API =====
openweather.api.key=${OPENWEATHER_API_KEY:YOUR_OPENWEATHER_API_KEY}
openweather.api.url=https://api.openweathermap.org/data/2.5

# ===== CORS =====
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:*}
