# ===== Server =====
server.port=8080

# ===== H2 Database (Development) =====
# spring.datasource.url=jdbc:h2:file:./data/traveldb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== MySQL (Production) =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/travelcompanion}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=TravelCompanionSecretKey2024VeryLongSecretKeyForJWTTokenGeneration256Bit
jwt.expiration=86400000

# ===== OpenWeather API =====
openweather.api.key=YOUR_OPENWEATHER_API_KEY
openweather.api.url=https://api.openweathermap.org/data/2.5

# ===== CORS =====
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}
